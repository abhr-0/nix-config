keys:
  - &abhro age1z7p3rey3aavfrpul5xg7jdrmwsw37fglnkgnmjd2a98dhzlmq58q6saeaa
  - &earth age1945gxc3786mxqyj2rxn37ans407qxsvqh0agcet5adxuenm9kycsv35r8z
  - &pluto age1m4d87mngyen9a2x45rgs5tpc5rsss0qu68qtdezpudeagn7qmveqffxnua
creation_rules:
  - path_regex: secrets/(abhroIcon|host)\.(yaml|enc)$
    key_groups:
      - age:
          - *abhro
          - *earth
          - *pluto
  - path_regex: secrets/earth\.(yaml|enc)$
    key_groups:
      - age:
          - *abhro
          - *earth
  - path_regex: secrets/pluto\.(yaml|enc)$
